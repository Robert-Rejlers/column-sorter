<div class="container">
  <div class="example-header">
    <span class="col-name">Kolumn</span>
    <span class="include-select">Inkluderas från start</span>
  </div>
  <div class="columns" cdkDropList class="example-list" (cdkDropListDropped)="drop($event)">
    @for (column of columns; track column) {
      <div class="example-box" cdkDrag>
        <span class="col-name">{{ column.name }}</span>
        <mat-select [(ngModel)]="column.include" class="include-select">
          <mat-option [value]="true">Ja</mat-option>
          <mat-option [value]="false">Nej</mat-option>
        </mat-select>
      </div>
    }
  </div>
<div style="display: flex; gap: 12px; align-items: center; margin-top: 16px;">
  <button mat-raised-button color="primary" (click)="generateOutput()">Generera svar</button>
  <button mat-raised-button *ngIf="output" (click)="copyOutput()">Kopiera</button>
  <span *ngIf="copied" style="font-size: 13px; color: green;">Kopierat!</span>
</div>

<pre *ngIf="output">{{ output }}</pre>
</div>
